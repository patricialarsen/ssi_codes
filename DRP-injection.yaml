description: DRP Pipeline for LSSTComCam
instrument: lsst.obs.lsst.LsstComCam
parameters:
  source_type_column: source_type
  source_type_columns:
  - g_comp1_source_type
  - g_comp2_source_type
  - r_comp1_source_type
  - r_comp2_source_type
  - i_comp1_source_type
  - i_comp2_source_type
  - z_comp1_source_type
  - z_comp2_source_type
  add_point_source: false
  fix_centroid: false
  use_shapelet_psf: false
  bands_injected:
  - g 
  - r 
  - i 
  - z 
  flux_algorithms:
  - cModel    
  - gaap1p0
  - gaap3p0
  - kron    
  - psf     
  - sersic    
  objectTableCoreKeysWithBand:
  - e1Diff_{band}_highSNStars_median
  - e1Diff_{band}_highSNStars_sigmaMad
  - e1Diff_{band}_lowSNStars_median
  - e1Diff_{band}_lowSNStars_sigmaMad
  - e2Diff_{band}_highSNStars_median
  - e2Diff_{band}_highSNStars_sigmaMad
  - e2Diff_{band}_lowSNStars_median
  - e2Diff_{band}_lowSNStars_sigmaMad
  - psfCModelScatter_{band}_psf_cModel_diff_median
  - psfCModelScatter_{band}_psf_cModel_diff_sigmaMad
  - psfCModelScatter_{band}_psf_cModel_diff_mean
  - shapeSizeFractionalDiff_{band}_highSNStars_median
  - shapeSizeFractionalDiff_{band}_highSNStars_sigmaMad
  - shapeSizeFractionalDiff_{band}_lowSNStars_median
  - shapeSizeFractionalDiff_{band}_lowSNStars_sigmaMad
  - skyFluxStatisticMetric_{band}_medianSky
  - skyFluxStatisticMetric_{band}_meanSky
  - skyFluxStatisticMetric_{band}_stdevSky
  - skyFluxStatisticMetric_{band}_sigmaMADSky
  objectTableCorePlotKeys:
  - wPerpPSF_wPerp_psfFlux_median
  - wPerpPSF_wPerp_psfFlux_sigmaMAD
  - yPerpPSF_yPerp_psfFlux_median
  - yPerpPSF_yPerp_psfFlux_sigmaMAD
  - skippedDeblenderMetrics_numSkippedPeaks
  - skippedDeblenderMetrics_numSkippedBlends
  - skippedDeblenderMetrics_numBlendParentTooBig
  - skippedDeblenderMetrics_numBlendTooManyPeaks
  - skippedDeblenderMetrics_numBlendTooManyMasked
  objectTableCoreRefCatMatchKeysWithBand:
  - astromDiffMetrics_{band}_AA1_RA_coadd
  - astromDiffMetrics_{band}_AA1_sigmaMad_RA_coadd
  - astromDiffMetrics_{band}_AA1_Dec_coadd
  - astromDiffMetrics_{band}_AA1_sigmaMad_Dec_coadd
  - astromDiffMetrics_{band}_AA1_tot_coadd
  - astromDiffMetrics_{band}_AA1_sigmaMad_tot_coadd
tasks:
  consolidate_injected_catalogs:
    class: lsst.source.injection.utils.ConsolidateInjectedCatalogsTask
    config:
    - connections.input_catalogs: injected_deep_coadd_predetection_catalog
      connections.output_catalog: injected_deep_coadd_predetection_catalog_tract
      columns_extra:
      - n
      - half_light_radius
      - q
      - beta
      groupIdKey: group_id
      pixel_match_radius: -1
  matchObjectToInjectedMultitract:
    class: lsst.pipe.tasks.match_tract_catalog.MatchTractCatalogTask
    config:
    - python: |
        from lsst.pipe.tasks.match_tract_catalog_probabilistic import MatchTractCatalogProbabilisticTask

        config.match_tract_catalog.retarget(MatchTractCatalogProbabilisticTask)

        columns_ref_mag_to_nJy = {}
        columns_ref_copy = [
          "injected_id", *parameters.source_type_columns, "injection_flag",
          "injected_isPatchInner", "injected_isTractInner", "injected_isPrimary",
        ]
        columns_target_copy = [
          "objectId", "patch", "detect_isDeblendedSource", "detect_isPatchInner", "detect_isPrimary",
          "merge_peak_sky", "refExtendedness", "refSizeExtendedness", "shape_xx", "shape_yy", "shape_xy",
        ]
        bands = parameters.bands_injected
        for band in bands:
          columns_ref_mag_to_nJy[f"{band}_mag"] = f"{band}_flux"
        for band in bands:
          columns_ref_copy.append(f"{band}_hsmShapeRegauss_e1")
          columns_ref_copy.append(f"{band}_hsmShapeRegauss_e2")
          columns_ref_copy.append(f"{band}_hsmShapeRegauss_flag")
          columns_ref_copy.append(f"{band}_hsmShapeRegauss_sigma")
          columns_ref_copy.append(f"{band}_ixxPSF")
          columns_ref_copy.append(f"{band}_iyyPSF")
          columns_ref_copy.append(f"{band}_ixyPSF")
          for suffix in ("mag", "injection_flag"):
              columns_ref_copy.append(f"{band}_{suffix}")
          done_gaap = False
          for algo in parameters.flux_algorithms:
            is_gaap = algo.startswith("gaap")
            if not done_gaap and is_gaap:
              columns_target_copy.append(f"{band}_gaapFlux_flag")
              done_gaap = True
            suffixes = ["Flux", "FluxErr"]
            if is_gaap:
              suffixes.append("Flux_flag_bigPsf")
            elif algo == "cModel":
              suffixes.append("_flag")
            elif algo != "sersic":
              suffixes.append("Flux_flag")
            for suffix in suffixes:
              columns_target_copy.append(f"{band}_{algo}{suffix}")
        if "sersic" in parameters.flux_algorithms:
          columns_target_copy.extend([
            "sersic_x", "sersic_y", "sersic_xErr", "sersic_yErr",
            "sersic_ra", "sersic_dec", "sersic_raErr", "sersic_decErr",
            "sersic_index", "sersic_indexErr", "sersic_rho", "sersic_rhoErr",
            "sersic_reff_x", "sersic_reff_xErr", "sersic_reff_y", "sersic_reff_yErr",
            "sersic_unknown_flag", "sersic_no_data_flag",
          ])
        # TODO: Remove as part of DM-44139
        config.diff_matched_catalog.columns_ref_mag_to_nJy = columns_ref_mag_to_nJy
      match_tract_catalog.column_ref_order: i_mag
      match_tract_catalog.columns_ref_meas:
      - ra
      - dec
      match_tract_catalog.columns_target_meas:
      - coord_ra
      - coord_dec
      match_tract_catalog.columns_target_err:
      - coord_raErr
      - coord_decErr
      match_tract_catalog.columns_ref_copy:
      - injected_id
      match_tract_catalog.columns_target_copy:
      - objectId
      match_tract_catalog.columns_ref_select_true:
      - injected_isPrimary
      match_tract_catalog.columns_ref_select_false:
      - injection_flag
      match_tract_catalog.columns_target_select_true:
      - detect_isPrimary
      match_tract_catalog.columns_target_select_false:
      - merge_peak_sky
      match_tract_catalog.match_n_finite_min: 2
      match_tract_catalog.order_ascending: true
      output_matched_catalog: true
      diff_matched_catalog.column_matched_prefix_ref: ref_
      diff_matched_catalog.columns_target_coord_err:
      - coord_raErr
      - coord_decErr
      diff_matched_catalog.columns_ref_copy: columns_ref_copy
      diff_matched_catalog.columns_target_copy: columns_target_copy
      diff_matched_catalog.include_unmatched: true
      connections.name_input_cat_ref: injected_deep_coadd_predetection_catalog_tract
      connections.name_input_cat_target: injected_objectTable_tract
  compare_object_to_injected:
    class: lsst.pipe.tasks.diff_matched_tract_catalog.DiffMatchedTractCatalogTask
    config:
      connections.name_input_cat_ref: injected_deep_coadd_predetection_catalog_tract
      connections.name_input_cat_target: injected_objectTable_tract
  diff_matched_analysis_multitract:
    class: lsst.analysis.tools.tasks.DiffMatchedAnalysisTask
    config:
      connections.inputName: matched_injected_deep_coadd_predetection_catalog_tract_injected_objectTable_tract
      connections.outputName: matched_injected_deep_coadd_predetection_catalog_tract_injected_objectTable_tract_multitract
      load_multiple: True
  inject_coadd:
    class: lsst.source.injection.inject_coadd.CoaddInjectTask
    config:
    - connections.input_exposure: deep_coadd
      connections.output_exposure: injected_deep_coadd_predetection_exp_A360
      connections.output_catalog: injected_deep_coadd_predetection_catalog

  fitDeepCoaddPsfGaussians:
    class: lsst.meas.extensions.multiprofit.pipetasks_fit.MultiProFitCoaddPsfFitTask
    config:
    - connections.cat_meas: injected_deep_coadd_meas
      connections.coadd: injected_deep_coadd_calexp
      connections.cat_output: injected_deep_coadd_psfs_multiprofit
  fitDeblendedObjectsSersic:
    class: lsst.meas.extensions.multiprofit.pipetasks_fit.MultiProFitCoaddSersicFitTask
    config:
    - python: |
        config.finalize(
          add_point_source=parameters.add_point_source,
          fix_centroid=parameters.fix_centroid,
          use_shapelet_psf=parameters.use_shapelet_psf,
        )
    - connections.cat_ref: injected_deep_coadd_ref
      connections.models_psf: injected_deep_coadd_psfs_multiprofit
      connections.cats_meas: injected_deep_coadd_meas
      connections.coadds: injected_deep_coadd_calexp
      connections.models_scarlet: injected_deep_coadd_scarletModelData
      connections.cat_output: injected_deep_coadd_Sersic_multiprofit
  isr:
    class: lsst.ip.isr.IsrTaskLSST
  calibrateImage:
    class: lsst.pipe.tasks.calibrateImage.CalibrateImageTask
    config:
    - file:
      - $DRP_PIPE_DIR/config/calibrateImage.py
      connections.initial_stars_schema: src_schema
      connections.stars_footprints: src
      connections.stars: source
      connections.exposure: calexp
      connections.background: calexpBackground
    - connections.stars: preSource
      connections.exposure: calexp
      connections.background: calexpBackground
  transformSourceTable:
    class: lsst.pipe.tasks.postprocess.TransformSourceTableTask
    config:
    - functorFile: $PIPE_TASKS_DIR/schemas/PreSource.yaml
    - connections.inputCatalog: recalibrated_star_unstandardized
      functorFile: $PIPE_TASKS_DIR/schemas/Source.yaml
  consolidateSourceTable:
    class: lsst.pipe.tasks.postprocess.ConsolidateSourceTableTask
  consolidateVisitSummary:
    class: lsst.pipe.tasks.postprocess.ConsolidateVisitSummaryTask
  isolatedStarAssociation:
    class: lsst.pipe.tasks.isolatedStarAssociation.IsolatedStarAssociationTask
    config:
    - connections.source_table_visit: sourceTable_visit
    - connections.source_table_visit: preSourceTable_visit
  finalizeCharacterization:
    class: lsst.pipe.tasks.finalizeCharacterization.FinalizeCharacterizationTask
  updateVisitSummary:
    class: lsst.drp.tasks.update_visit_summary.UpdateVisitSummaryTask
    config:
    - wcs_provider: tract
      photo_calib_provider: global
      background_provider: replacement
    - wcs_provider: tract
      photo_calib_provider: global
      background_provider: input_summary
  reprocessVisitImage:
    class: lsst.drp.tasks.reprocess_visit_image.ReprocessVisitImageTask
    config:
    - connections.background_1: calexpBackground
      remove_initial_photo_calib: false
      do_use_sky_corr: true
    - do_use_sky_corr: false
  makeCcdVisitTable:
    class: lsst.pipe.tasks.postprocess.MakeCcdVisitTableTask
  makeVisitTable:
    class: lsst.pipe.tasks.postprocess.MakeVisitTableTask
  makeDirectWarp:
    class: lsst.drp.tasks.make_direct_warp.MakeDirectWarpTask
    config:
    - connections.calexp_list: visit_image
      useVisitSummaryPhotoCalib: false
      useVisitSummaryWcs: false
      useVisitSummaryPsf: false
      connections.visit_summary: visit_summary
      connections.warp: direct_warp
      connections.masked_fraction_warp: direct_warp_masked_fraction
      # idGenerator.release_id: parameters.release_id
  makePsfMatchedWarp:
    class: lsst.drp.tasks.make_psf_matched_warp.MakePsfMatchedWarpTask
    config:
    - connections.direct_warp: direct_warp
      connections.psf_matched_warp: psf_matched_warp
  selectDeepCoaddVisits:
    class: lsst.pipe.tasks.selectImages.BestSeeingSelectVisitsTask
    config:
    - connections.visitSummaries: visit_summary
      connections.goodVisits: deep_coadd_visit_selection
      maxPsfFwhm: 2.0
      nVisitsMax: -1
    - maxPsfFwhm: 1.7
  assembleDeepCoadd:
    class: lsst.drp.tasks.assemble_coadd.CompareWarpAssembleCoaddTask
    config:
    - connections.inputWarps: direct_warp
      connections.psfMatchedWarps: psf_matched_warp
      connections.selectedVisits: deep_coadd_visit_selection
      connections.coaddExposure: deep_coadd
      connections.nImage: deep_coadd_n_image
      connections.inputMap: deep_coadd_input_map
      connections.templateCoadd: deep_coadd_compare_template
      doInputMap: true
      doSelectVisits: true
      doWriteArtifactMasks: true
      assembleStaticSkyModel.doSelectVisits: true
  healSparsePropertyMaps:
    class: lsst.pipe.tasks.healSparseMapping.HealSparsePropertyMapTask
    config:
    - connections.input_maps: deep_coadd_input_map
      #connections.coadd_exposures: deep_coadd
      #connections.visit_summaries: visit_summary
      connections.visit_summaries: visit_summary
      #- connections.coadd_exposures: injected_deep_coadd_predetection_exp_A360
    - connections.coadd_exposures: deep_coadd
      connections.sky_background_map_weighted_mean: injected_deep_coadd_sky_background_map_weighted_mean
      connections.psf_maglim_map_weighted_mean: injected_deep_coadd_psf_maglim_map_weighted_mean
      connections.epoch_map_max: injected_deep_coadd_epoch_map_max
      connections.epoch_map_min: injected_deep_coadd_epoch_map_min
      connections.dcr_e1_map_weighted_mean: injected_deep_coadd_dcr_e1_map_weighted_mean
      connections.psf_size_map_weighted_mean: injected_deep_coadd_psf_size_map_weighted_mean
      connections.dcr_e2_map_weighted_mean: injected_deep_coadd_dcr_e2_map_weighted_mean
      connections.epoch_map_mean: injected_deep_coadd_epoch_map_mean
      connections.psf_e2_map_weighted_mean: injected_deep_coadd_psf_e2_map_weighted_mean
      connections.sky_noise_map_weighted_mean: injected_deep_coadd_sky_noise_map_weighted_mean
      connections.dcr_ddec_map_weighted_mean: injected_deep_coadd_dcr_ddec_map_weighted_mean
      connections.exposure_time_map_sum: injected_deep_coadd_exposure_time_map_sum
      connections.dcr_dra_map_weighted_mean: injected_deep_coadd_dcr_dra_map_weighted_mean
      connections.psf_e1_map_weighted_mean: injected_deep_coadd_psf_e1_map_weighted_mean
  consolidateHealSparsePropertyMaps:
    class: lsst.pipe.tasks.healSparseMapping.ConsolidateHealSparsePropertyMapTask
    config:
    - connections.sky_background_map_weighted_mean: injected_deep_coadd_sky_background_map_weighted_mean
      connections.psf_maglim_map_weighted_mean: injected_deep_coadd_psf_maglim_map_weighted_mean
      connections.epoch_map_max: injected_deep_coadd_epoch_map_max
      connections.epoch_map_min: injected_deep_coadd_epoch_map_min
      connections.dcr_e1_map_weighted_mean: injected_deep_coadd_dcr_e1_map_weighted_mean
      connections.psf_size_map_weighted_mean: injected_deep_coadd_psf_size_map_weighted_mean
      connections.dcr_e2_map_weighted_mean: injected_deep_coadd_dcr_e2_map_weighted_mean
      connections.epoch_map_mean: injected_deep_coadd_epoch_map_mean
      connections.psf_e2_map_weighted_mean: injected_deep_coadd_psf_e2_map_weighted_mean
      connections.sky_noise_map_weighted_mean: injected_deep_coadd_sky_noise_map_weighted_mean
      connections.dcr_ddec_map_weighted_mean: injected_deep_coadd_dcr_ddec_map_weighted_mean
      connections.exposure_time_map_sum: injected_deep_coadd_exposure_time_map_sum
      connections.dcr_dra_map_weighted_mean: injected_deep_coadd_dcr_dra_map_weighted_mean
      connections.psf_e1_map_weighted_mean: injected_deep_coadd_psf_e1_map_weighted_mean
      connections.sky_noise_consolidated_map_weighted_mean: injected_deep_coadd_sky_noise_consolidated_map_weighted_mean
      connections.epoch_consolidated_map_min: injected_deep_coadd_epoch_consolidated_map_min
      connections.dcr_e2_consolidated_map_weighted_mean: injected_deep_coadd_dcr_e2_consolidated_map_weighted_mean
      connections.epoch_consolidated_map_mean: injected_deep_coadd_epoch_consolidated_map_mean
      connections.psf_e1_consolidated_map_weighted_mean: injected_deep_coadd_psf_e1_consolidated_map_weighted_mean
      connections.exposure_time_consolidated_map_sum: injected_deep_coadd_exposure_time_consolidated_map_sum
      connections.psf_size_consolidated_map_weighted_mean: injected_deep_coadd_psf_size_consolidated_map_weighted_mean
      connections.dcr_dra_consolidated_map_weighted_mean: injected_deep_coadd_dcr_dra_consolidated_map_weighted_mean
      connections.dcr_e1_consolidated_map_weighted_mean: injected_deep_coadd_dcr_e1_consolidated_map_weighted_mean
      connections.dcr_ddec_consolidated_map_weighted_mean: injected_deep_coadd_dcr_ddec_consolidated_map_weighted_mean
      connections.sky_background_consolidated_map_weighted_mean: injected_deep_coadd_sky_background_consolidated_map_weighted_mean
      connections.psf_maglim_consolidated_map_weighted_mean: injected_deep_coadd_psf_maglim_consolidated_map_weighted_mean
      connections.epoch_consolidated_map_max: injected_deep_coadd_epoch_consolidated_map_max
      connections.psf_e2_consolidated_map_weighted_mean: injected_deep_coadd_psf_e2_consolidated_map_weighted_mean
  computeObjectEpochs:
    class: lsst.drp.tasks.compute_object_epochs.ComputeObjectEpochsTask
    config:
    - connections.epochMap: injected_deep_coadd_epoch_map_mean
      connections.objectCat: injected_deep_coadd_obj
      connections.objectEpochs: injected_object_epoch
  detection:
    class: lsst.pipe.tasks.multiBand.DetectCoaddSourcesTask
    config:
    - connections.exposure: injected_deep_coadd_predetection_exp_A360
      connections.detectionSchema: injected_deep_coadd_det_schema
      connections.outputBackgrounds: injected_deep_coadd_calexp_background
      connections.outputSources: injected_deep_coadd_det
      connections.outputExposure: injected_deep_coadd_calexp
  mergeDetections:
    class: lsst.pipe.tasks.mergeDetections.MergeDetectionsTask
    config:
    - connections.schema: injected_deep_coadd_det_schema
      connections.catalogs: injected_deep_coadd_det
      connections.outputSchema: injected_deep_coadd_mergeDet_schema
      connections.outputPeakSchema: injected_deep_coadd_peak_schema
      connections.outputCatalog: injected_deep_coadd_mergeDet
  deblend:
    class: lsst.pipe.tasks.deblendCoaddSourcesPipeline.DeblendCoaddSourcesMultiTask
    config:
    - connections.peakSchema: injected_deep_coadd_peak_schema
      connections.inputSchema: injected_deep_coadd_mergeDet_schema
      connections.coadds: injected_deep_coadd_calexp
      connections.mergedDetections: injected_deep_coadd_mergeDet
      connections.outputSchema: injected_deep_coadd_deblendedFlux_schema
      connections.scarletModelData: injected_deep_coadd_scarletModelData
      connections.deblendedCatalog: injected_deep_coadd_deblendedCatalog
      multibandDeblend.maxFootprintArea: -1
      multibandDeblend.maxNumberOfPeaks: -1
      multibandDeblend.maxAreaTimesPeaks: -1
  measure: 
    class: lsst.pipe.tasks.multiBand.MeasureMergedCoaddSourcesTask
    config:
      doPropagateFlags: false
      connections.inputSchema: injected_deep_coadd_deblendedFlux_schema
      connections.scarletModels: injected_deep_coadd_scarletModelData
      connections.exposure: injected_deep_coadd_calexp
      connections.scarletCatalog: injected_deep_coadd_deblendedCatalog
      connections.outputSchema: injected_deep_coadd_meas_schema
      connections.outputSources: injected_deep_coadd_meas
  mergeMeasurements:
    class: lsst.pipe.tasks.mergeMeasurements.MergeMeasurementsTask
    config:
    - connections.inputSchema: injected_deep_coadd_meas_schema
      connections.catalogs: injected_deep_coadd_meas
      connections.outputSchema: injected_deep_coadd_ref_schema
      connections.mergedCatalog: injected_deep_coadd_ref
  writeObjectTable:
    class: lsst.pipe.tasks.postprocess.WriteObjectTableTask
    config:
    - connections.inputCatalogMeas: injected_deep_coadd_meas
      connections.inputCatalogForcedSrc: injected_deep_coadd_forced_src
      connections.inputCatalogPsfsMultiprofit: injected_deep_coadd_psfs_multiprofit
      connections.outputCatalog: injected_deep_coadd_obj
  transformObjectTable:
    class: lsst.pipe.tasks.postprocess.TransformObjectCatalogTask
    config:
    - connections.inputCatalog: injected_deep_coadd_obj
      connections.inputCatalogEpoch: injected_object_epoch
      connections.inputCatalogRef: injected_deep_coadd_ref
      connections.inputCatalogSersicMultiprofit: injected_deep_coadd_Sersic_multiprofit
      connections.outputCatalog: injected_objectTable
  consolidateObjectTable:
    class: lsst.pipe.tasks.postprocess.ConsolidateObjectTableTask
    config:
    - connections.inputCatalogs: injected_objectTable
      connections.outputCatalog: injected_objectTable_tract
  splitPrimaryObject:
    class: lsst.pipe.tasks.split_primary.SplitPrimaryTask
    config:
    - dimensions:
      - tract
      connections.full: objectTable_tract
      connections.primary: objectTable_primary
      connections.nonprimary: objectTable_nonprimary
    - connections.full: injected_objectTable_tract
      connections.primary: injected_objectTable_primary
      connections.nonprimary: injected_objectTable_nonprimary
  forcedPhotCcd:
    class: lsst.meas.base.forcedPhotCcd.ForcedPhotCcdTask
    config:
    - connections.exposure: pvi
      useVisitSummary: false
      connections.inputSchema: injected_deep_coadd_ref_schema
      connections.refCat: injected_deep_coadd_ref
      connections.outputSchema: injected_forced_src_schema
      connections.measCat: injected_forced_src
  forcedPhotCoadd:
    class: lsst.drp.tasks.forcedPhotCoadd.ForcedPhotCoaddTask
    config:
    - connections.inputSchema: injected_deep_coadd_ref_schema
      connections.scarletModels: injected_deep_coadd_scarletModelData
      connections.exposure: injected_deep_coadd_calexp
      connections.refWcs: injected_deep_coadd_predetection_exp_A360.wcs
      connections.refCat: injected_deep_coadd_ref
      connections.refCatInBand: injected_deep_coadd_meas
      connections.outputSchema: injected_deep_coadd_forced_src_schema
      connections.measCat: injected_deep_coadd_forced_src
  selectGoodSeeingVisits:
    class: lsst.pipe.tasks.selectImages.BestSeeingQuantileSelectVisitsTask
    config:
    - connections.goodVisits: goodSeeingVisits
      nVisitsMin: 12
  templateGen:
    class: lsst.drp.tasks.assemble_coadd.CompareWarpAssembleCoaddTask
    config:
    - doSelectVisits: true
      assembleStaticSkyModel.doSelectVisits: true
      doNImage: true
      connections.selectedVisits: goodSeeingVisits
      connections.outputCoaddName: goodSeeing
      connections.coaddExposure: goodSeeingCoadd
  getTemplate:
    class: lsst.ip.diffim.getTemplate.GetTemplateTask
    config:
    - connections.bbox: pvi.bbox
      connections.wcs: pvi.wcs
      connections.coaddName: goodSeeing
      connections.coaddExposures: goodSeeingCoadd
      connections.template: goodSeeingDiff_templateExp
  subtractImages:
    class: lsst.ip.diffim.subtractImages.AlardLuptonSubtractTask
    config:
    - allowKernelSourceDetection: true
      connections.science: pvi
      connections.coaddName: goodSeeing
      connections.template: goodSeeingDiff_templateExp
      connections.difference: goodSeeingDiff_differenceTempExp
      connections.matchedTemplate: goodSeeingDiff_matchedExp
  detectAndMeasureDiaSources:
    class: lsst.ip.diffim.detectAndMeasure.DetectAndMeasureTask
    config:
    - connections.science: pvi
      connections.coaddName: goodSeeing
      connections.matchedTemplate: goodSeeingDiff_matchedExp
      connections.difference: goodSeeingDiff_differenceTempExp
      connections.subtractedMeasuredExposure: goodSeeingDiff_differenceExp
      doSkySources: true
  filterDiaSrcCat:
    class: lsst.ap.association.FilterDiaSourceCatalogTask
