    description: All tasks from the 'diffimDRP' subset impacted by source injection.
  rerun_coadd:
    subset:
    - selectDeepCoaddVisits
    - makeDirectWarp
    - makePsfMatchedWarp
    - assembleDeepCoadd
    - healSparsePropertyMaps
  injected_step_a360_nocoadd:
