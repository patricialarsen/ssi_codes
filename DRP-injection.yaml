    - fitDeblendedObjectsSersic
    - fitDeepCoaddPsfGaussians    
    - computeObjectEpochs
    - mergeDetections
    - writeObjectTable
    - transformObjectTable
    - detection
    - deblend
    - mergeMeasurements
    - measure
    - forcedPhotCoadd
    - inject_coadd
    description: All tasks from the 'step3a' subset impacted by source injection + some others to generate dependencies.
  injected_step_a360_1:
    subset:
    - fitDeblendedObjectsSersic
    - fitDeepCoaddPsfGaussians    
    - makeDirectWarp
    - healSparsePropertyMaps
    - selectDeepCoaddVisits
    - makePsfMatchedWarp
    - assembleDeepCoadd
    - computeObjectEpochs
    - mergeDetections
    - writeObjectTable
    - transformObjectTable
    - detection
    - deblend
    - mergeMeasurements
    - measure
    - forcedPhotCoadd
    - inject_coadd
    description: All tasks from the 'step3a' subset impacted by source injection + some others to generate dependencies.
  injected_step_a360_2a:
    - consolidateObjectTable
    - consolidate_injected_catalogs
    - matchObjectToInjectedMultitract
  injected_step_a360_2b:
